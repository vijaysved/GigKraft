<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--gk-cream); font-family:var(--gk-font-body); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border:var(--gk-border); border-radius:var(--gk-radius-lg); box-shadow:var(--gk-shadow-sm); overflow:hidden; }
  .chip { height:74px; }
  .meta { padding:8px 10px; background:var(--gk-card); }
  .name { font-family:var(--gk-font-display); font-weight:600; font-size:14px; color:var(--gk-ink); }
  .hex { font-size:11px; color:var(--gk-muted); letter-spacing:.5px; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gk-orange)"></div><div class="meta"><div class="name">Electric Orange</div><div class="hex">#FF6B00 · primary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-navy)"></div><div class="meta"><div class="name">Deep Cobalt</div><div class="hex">#0A2540 · ink</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-lime)"></div><div class="meta"><div class="name">Hi-Vis Lime</div><div class="hex">#CCFF00 · proof</div></div></div>
  </div>
</body>
</html>
