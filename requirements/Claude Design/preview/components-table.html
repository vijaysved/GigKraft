<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--gk-cream); font-family:var(--gk-font-body); }
  table { width:100%; border-collapse:separate; border-spacing:0; background:#fff; border:var(--gk-border); border-radius:12px; overflow:hidden; box-shadow:var(--gk-shadow-sm); }
  th { background:var(--gk-navy); color:#fff; padding:9px 12px; font-family:var(--gk-font-display); font-weight:600; font-size:12px; text-align:left; }
  td { padding:10px 12px; font-size:12px; border-bottom:1px solid #E2E8F0; color:var(--gk-ink); }
  tr:last-child td { border-bottom:none; }
  .ibtn { color:#fff; border:1.5px solid var(--gk-navy); padding:4px 9px; border-radius:5px; font-size:11px; font-weight:700; box-shadow:var(--gk-shadow-xs); }
  .price { color:var(--gk-orange); font-weight:700; }
</style>
</head>
<body>
  <table>
    <thead><tr><th>Task ID</th><th>Context</th><th>Budget</th><th>Dispatch</th></tr></thead>
    <tbody>
      <tr><td><strong>#TSK-8902</strong></td><td>Kitchen Pipe Burst · Downtown</td><td class="price">$120.00</td>
        <td><span class="ibtn" style="background:var(--gk-success)">WhatsApp</span> <span class="ibtn" style="background:var(--gk-info)">SMS Pin</span></td></tr>
      <tr><td><strong>#TSK-8911</strong></td><td>Breaker Panel Trip · Eastside</td><td class="price">$240.00</td>
        <td><span class="ibtn" style="background:var(--gk-success)">WhatsApp</span> <span class="ibtn" style="background:var(--gk-info)">SMS Pin</span></td></tr>
    </tbody>
  </table>
</body>
</html>
