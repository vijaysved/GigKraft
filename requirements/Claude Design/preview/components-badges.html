<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--gk-cream); font-family:var(--gk-font-body); display:flex; flex-wrap:wrap; gap:14px; align-items:center; }
  .badge { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; background:var(--gk-lime); color:var(--gk-navy); padding:5px 11px; border-radius:20px; border:2px solid var(--gk-navy); box-shadow:var(--gk-shadow-xs); }
  .pill { font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; border:1.5px solid var(--gk-navy); }
  .status { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:var(--gk-success); }
  .status .dot { width:9px;height:9px;border-radius:50%;background:var(--gk-success); }
  .eyebrow { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gk-orange); }
</style>
</head>
<body>
  <span class="badge">Hub: Southwest US-04</span>
  <span class="pill" style="background:var(--gk-orange);color:#fff;">$120.00</span>
  <span class="pill" style="background:#fff;color:var(--gk-navy);">📍 SW-04</span>
  <span class="status"><span class="dot"></span>Subscription Paid</span>
  <span class="eyebrow">Screen 2 of 4 • Onboarding</span>
</body>
</html>
