<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--gk-cream); font-family:var(--gk-font-body); }
  .row { display:flex; align-items:baseline; gap:16px; padding:5px 0; border-bottom:1px dashed #d9d2c6; }
  .row:last-child { border-bottom:none; }
  .px { width:74px; font-size:11px; color:var(--gk-muted); font-weight:600; flex-shrink:0; }
  .sp { font-family:var(--gk-font-display); font-weight:600; color:var(--gk-ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>
</head>
<body>
  <div class="row"><span class="px">48 / 3xl</span><span class="sp" style="font-size:48px;">Gigkraft</span></div>
  <div class="row"><span class="px">36 / 2xl</span><span class="sp" style="font-size:36px;">Gigkraft</span></div>
  <div class="row"><span class="px">28 / xl</span><span class="sp" style="font-size:28px;">Gigkraft node</span></div>
  <div class="row"><span class="px">24 / lg</span><span class="sp" style="font-size:24px;">Gigkraft node ops</span></div>
  <div class="row"><span class="px">18 / md</span><span class="sp" style="font-size:18px;">Gigkraft node ops triage</span></div>
  <div class="row"><span class="px">15 / base</span><span class="sp" style="font-size:15px; font-weight:500; font-family:var(--gk-font-body);">Gigkraft node ops triage desk</span></div>
</body>
</html>
