<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--gk-cream); font-family:var(--gk-font-body); display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .tile { background:#fff; border:var(--gk-border); border-radius:10px; padding:13px; box-shadow:var(--gk-shadow-sm); }
  .k { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--gk-muted); }
  .v { font-family:var(--gk-font-display); font-weight:600; font-size:26px; margin-top:5px; color:var(--gk-orange); }
  .v.navy { color:var(--gk-navy); }
</style>
</head>
<body>
  <div class="tile"><div class="k">Pending Triage</div><div class="v navy">3 Tasks</div></div>
  <div class="tile"><div class="k">Active Ledger Pros</div><div class="v navy">142 Pros</div></div>
  <div class="tile"><div class="k">Monthly Run Rate</div><div class="v">$2,838.58</div></div>
</body>
</html>
