<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--gk-cream); font-family:var(--gk-font-body); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border:var(--gk-border); border-radius:var(--gk-radius-lg); box-shadow:var(--gk-shadow-sm); overflow:hidden; }
  .chip { height:64px; }
  .meta { padding:7px 10px; background:var(--gk-card); }
  .name { font-family:var(--gk-font-display); font-weight:600; font-size:12px; color:var(--gk-ink); }
  .hex { font-size:10px; color:var(--gk-muted); letter-spacing:.5px; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gk-cream)"></div><div class="meta"><div class="name">Cream</div><div class="hex">#FAF8F5 · app bg</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-card)"></div><div class="meta"><div class="name">Card</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-command)"></div><div class="meta"><div class="name">Command</div><div class="hex">#0F172A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-panel)"></div><div class="meta"><div class="name">Panel</div><div class="hex">#1E293B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-panel-2)"></div><div class="meta"><div class="name">Raised</div><div class="hex">#334155</div></div></div>
  </div>
</body>
</html>
