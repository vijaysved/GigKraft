<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--gk-cream); font-family:var(--gk-font-body); }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { background:var(--gk-card); border:var(--gk-border); }
  .lbl { font-size:11px; font-weight:600; color:var(--gk-muted); margin-top:8px; }
  .lbl b { display:block; color:var(--gk-ink); font-family:var(--gk-font-display); font-size:13px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:90px;height:60px;border-radius:6px;"></div><div class="lbl"><b>6px</b>sm · controls</div></div>
    <div class="item"><div class="box" style="width:90px;height:60px;border-radius:8px;"></div><div class="lbl"><b>8px</b>md · buttons</div></div>
    <div class="item"><div class="box" style="width:90px;height:60px;border-radius:12px;"></div><div class="lbl"><b>12px</b>lg · cards</div></div>
    <div class="item"><div class="box" style="width:90px;height:60px;border-radius:18px;"></div><div class="lbl"><b>18px</b>xl · sheets</div></div>
    <div class="item"><div class="box" style="width:90px;height:60px;border-radius:24px;"></div><div class="lbl"><b>24px</b>2xl · panels</div></div>
    <div class="item"><div class="box" style="width:60px;height:60px;border-radius:999px;"></div><div class="lbl"><b>pill</b>tags</div></div>
  </div>
</body>
</html>
