<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--gk-cream); font-family:var(--gk-font-body); }
  .cap { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gk-muted); margin-bottom:14px; }
  .grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
  .g { background:#fff; border:var(--gk-border); border-radius:10px; box-shadow:var(--gk-shadow-xs); padding:9px 4px; text-align:center; }
  .em { font-size:20px; }
  .nm { font-size:9px; font-weight:700; color:var(--gk-muted); margin-top:3px; }
</style>
</head>
<body>
  <div class="cap">Functional emoji glyph set (no icon font in source)</div>
  <div class="grid">
    <div class="g"><div class="em">🔧</div><div class="nm">Pro</div></div>
    <div class="g"><div class="em">🏠</div><div class="nm">Hire</div></div>
    <div class="g"><div class="em">📊</div><div class="nm">Dashboard</div></div>
    <div class="g"><div class="em">➕</div><div class="nm">Add Kraft</div></div>
    <div class="g"><div class="em">💳</div><div class="nm">Billing</div></div>
    <div class="g"><div class="em">🔍</div><div class="nm">Discover</div></div>
    <div class="g"><div class="em">🚨</div><div class="nm">Emergency</div></div>
    <div class="g"><div class="em">⚡</div><div class="nm">Live Ops</div></div>
    <div class="g"><div class="em">📡</div><div class="nm">Channel</div></div>
    <div class="g"><div class="em">⚠️</div><div class="nm">Safety</div></div>
    <div class="g"><div class="em">📍</div><div class="nm">Node</div></div>
    <div class="g"><div class="em">✨</div><div class="nm">After</div></div>
  </div>
</body>
</html>
