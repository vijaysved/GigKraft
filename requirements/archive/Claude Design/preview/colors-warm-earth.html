<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:var(--gk-cream); font-family:var(--gk-font-body); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border:var(--gk-border); border-radius:var(--gk-radius-lg); box-shadow:var(--gk-shadow-sm); overflow:hidden; }
  .chip { height:74px; }
  .meta { padding:8px 10px; background:var(--gk-card); }
  .name { font-family:var(--gk-font-display); font-weight:600; font-size:13px; color:var(--gk-ink); }
  .hex { font-size:11px; color:var(--gk-muted); letter-spacing:.5px; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gk-kraft)"></div><div class="meta"><div class="name">Kraft Tan</div><div class="hex">#E7D8C2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-clay)"></div><div class="meta"><div class="name">Terracotta</div><div class="hex">#C4622D</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-timber)"></div><div class="meta"><div class="name">Timber Brown</div><div class="hex">#6B4A2B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gk-cream)"></div><div class="meta"><div class="name">Warm Cream</div><div class="hex">#FAF8F5</div></div></div>
  </div>
</body>
</html>
