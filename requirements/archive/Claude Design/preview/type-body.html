<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--gk-cream); font-family:var(--gk-font-body); }
  .tag { font-family:var(--gk-font-body); font-weight:700; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gk-muted); margin-bottom:14px; }
  .eyebrow { font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--gk-orange); }
  p { font-family:var(--gk-font-body); color:var(--gk-ink); line-height:1.6; }
</style>
</head>
<body>
  <div class="tag">Quicksand · Body &amp; UI</div>
  <div class="eyebrow">Screen 2 of 4 • Onboarding</div>
  <p style="font-size:15px; font-weight:500; margin:8px 0 0;">Skip the reviews. See actual before/after invoices confirmed within your immediate zip code node — proof beats promises.</p>
  <p style="font-size:13px; font-weight:500; color:var(--gk-muted); margin:8px 0 0;">Secondary / muted — 13px, weight 500, used for helper text and metadata.</p>
</body>
</html>
