name: GigKraft Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gigkraft_test
          POSTGRES_USER: gigkraft
          POSTGRES_PASSWORD: gigkraft
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gigkraft"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Backend Test Suite
        env:
          DJANGO_SECRET_KEY: 'ci-test-key-safe-to-expose'
          DATABASE_URL: 'postgresql://gigkraft:gigkraft@localhost:5432/gigkraft_test'
          DJANGO_SETTINGS_MODULE: config.settings.local
        run: |
          cd backend
          python manage.py test

      # Railway deploy is manual for now — add RAILWAY_TOKEN secret and
      # uncomment these steps when ready to enable automatic deployment.
      # - name: Install Railway CLI
      #   run: npm install -g @railway/cli
