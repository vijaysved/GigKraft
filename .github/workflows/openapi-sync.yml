name: OpenAPI Contract Sync

on:
  workflow_run:
    workflows: ["GigKraft Backend CI/CD"]
    types:
      - completed

jobs:
  sync-types:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Schema Generator
        run: npm install -g openapi-typescript

      - name: Generate TypeScript Definitions
        run: |
          mkdir -p frontend/src/api/generated
          openapi-typescript https://gigkraft-backend-production.up.railway.app/api/openapi.json --output frontend/src/api/generated/types.ts

      - name: Detect Changes
        id: git-check
        run: |
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Open Automatic Sync Pull Request
        if: steps.git-check.outputs.changed > 0
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-sync openapi types from backend schema update"
          title: "chore: auto-sync OpenAPI types"
          body: "Generated automatically after a successful backend deploy. Merge to redeploy frontend with updated types."
          branch: "automation/openapi-schema-sync"
          base: "main"

      # If there were no schema changes, redeploy frontend immediately so it
      # picks up any backend behaviour changes without waiting for a code push.
      - name: Trigger Frontend Redeploy (schema unchanged)
        if: steps.git-check.outputs.changed == 0
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: frontend
        run: |
          npm ci
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
