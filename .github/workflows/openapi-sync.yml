name: OpenAPI Contract Sync

on:
  workflow_run:
    workflows: ["GigKraft Backend CI/CD"]
    types:
      - completed

jobs:
  sync-types:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Schema Generator
        run: npm install -g openapi-typescript

      - name: Generate TypeScript Definitions
        run: |
          mkdir -p frontend/src/api/types
          openapi-typescript https://gigkraft-backend.up.railway.app/api/openapi.json --output frontend/src/api/types/api.ts

      - name: Detect Changes
        id: git-check
        run: |
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Open Automatic Sync Pull Request
        if: steps.git-check.outputs.changed > 0
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-sync openapi types from backend schema update"
          title: "🤖 Automated OpenAPI Type Updates"
          body: "This PR was generated automatically following a successful backend schema modification."
          branch: "automation/openapi-schema-sync"
          base: "main"
