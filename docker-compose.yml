# GigKraft local development stack.
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
#
# Services: postgres, redis, backend (8000), frontend (5173), mobile web (8081)
# Hot reload is enabled for all three app services via volume mounts.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gigkraft}
      POSTGRES_USER: ${POSTGRES_USER:-gigkraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigkraft}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gigkraft}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Django + Django Ninja API (Milestone 2) ---
  # Copy backend/.env.example to backend/.env for local overrides (optional;
  # the container falls back to safe local defaults plus the overrides below).
  backend:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Inside the compose network, postgres/redis hostnames replace localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER:-gigkraft}:${POSTGRES_PASSWORD:-gigkraft}@postgres:5432/${POSTGRES_DB:-gigkraft}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # --- React + Vite web app ---
  frontend:
    build: ./frontend
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # --- Expo dev server (web preview / CI) ---
  # For iOS/Android simulators, run `npm run start` on the host instead.
  mobile:
    build: ./mobile
    env_file:
      - path: ./mobile/.env
        required: false
    environment:
      EXPO_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "8081:8081"
    depends_on:
      - backend
    volumes:
      - ./mobile:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
